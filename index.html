<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CAR Brasil</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
margin:0;
padding:0;
height:100%;
}

#map{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

.painel{
position:absolute;
top:10px;
left:10px;
z-index:9999;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.3);
width:280px;
}

select,button{
width:100%;
padding:10px;
margin-top:5px;
}

button{
background:#00AE9D;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="painel">
<h3>🌎 CAR Brasil</h3>

<select id="estado">
<option value="pr">Paraná</option>
<option value="ms">Mato Grosso do Sul</option>
<option value="mt">Mato Grosso</option>
<option value="go">Goiás</option>
<option value="sc">Santa Catarina</option>
<option value="rs">Rio Grande do Sul</option>
<option value="sp">São Paulo</option>
<option value="mg">Minas Gerais</option>
<option value="ba">Bahia</option>
<option value="pa">Pará</option>
</select>

<button onclick="carregarEstado()">
Carregar Estado
</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-15,-54],4);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

var camadaCAR;

function carregarEstado(){

var estado =
document.getElementById('estado').value;

if(camadaCAR){
map.removeLayer(camadaCAR);
}

camadaCAR = L.tileLayer.wms(
'https://geoserver.car.gov.br/geoserver/sicar/wms',
{
layers:'sicar:sicar_imoveis_' + estado,
format:'image/png',
transparent:true
}
).addTo(map);

}

carregarEstado();

</script>

</body>
</html>
